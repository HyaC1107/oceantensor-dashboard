# 어텐션플리즈 웹앱 배포 — 백엔드(FastAPI, mock) + 프론트(nginx)
# 실행: 프로젝트 루트(seaweed-hwangbaek)에서
#   docker compose -f deploy/docker-compose.deploy.yml up -d --build
#
# ⚠️ 이 파일은 "웹앱"만 담당. DB/Grafana 모니터링 스택은 루트 docker-compose.yml.
#    mock 모드라 DB 없이도 v13 팩 서빙 동작(검증됨 2026-07-11).

services:
  backend:
    build:
      context: ..                      # 프로젝트 루트
      dockerfile: deploy/Dockerfile.backend
    container_name: attention-backend
    environment:
      USE_MOCK_DATA: "true"
      # 실제 DB 연동 전환 시: USE_MOCK_DATA=false + DATABASE_URL 지정
      # DATABASE_URL: "postgresql+asyncpg://<DB_USER>:<DB_PASSWORD>@<db-host>:5432/oceantensor_db"
      # XAI LLM 라이브(선택): GEMINI_API_KEY 넣으면 Gemini, 없으면 템플릿 폴백
      # GEMINI_API_KEY: "${GEMINI_API_KEY}"
    expose:
      - "8000"                         # 외부 비공개 — nginx 통해서만
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ""          # 같은 오리진 → 상대경로
        VITE_WS_URL: "/ws/sensor"      # 상대 WS (http→ws / https→wss 자동)
    container_name: attention-web
    ports:
      - "80:80"                        # HTTPS는 아래 DEPLOY.md의 certbot 참고
    depends_on:
      - backend
    restart: unless-stopped
