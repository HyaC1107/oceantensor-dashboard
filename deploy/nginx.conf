# 어텐션플리즈 nginx — 프론트 정적서빙 + 백엔드(FastAPI) 리버스프록시
# 같은 오리진(80/443)에서 다 서빙 → CORS 불필요.
# backend = compose 서비스명(도커 내부 DNS), 포트 8000.

upstream attention_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # 업로드/응답 여유
    client_max_body_size 20m;

    # ── API 프리픽스 → 백엔드 프록시 ───────────────────────────
    location ~ ^/(predict|explain|rag|sensor|admin|docs|openapi\.json|metrics) {
        proxy_pass http://attention_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket (실시간 센서 스트림) ─────────────────────────
    location /ws/ {
        proxy_pass http://attention_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;   # WS 장기 연결 유지
    }

    # ── 프론트 SPA (해시 라우팅) ───────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
