apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgresql:5432
    database: oceantensor_db
    user: oceantensor_user
    secureJsonData:
      password: "$__env{LOCAL_DB_PASSWORD}"  # docker-compose.yml의 LOCAL_DB_PASSWORD와 동일 값 사용
    jsonData:
      sslmode: disable
      postgresVersion: 1700
    editable: true
